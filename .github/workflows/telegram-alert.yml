# Telegram alert when a CLEAN four-family setup forms on live Delta data.
# SELF-CONTAINED: the scan script is embedded (base64) and written at runtime,
# so it does NOT require alert-scan.js to be committed. Uses your scanner.js
# (already in the repo). SCAN-ONLY, no orders.
# Needs two repo secrets (Settings -> Secrets and variables -> Actions):
#   TELEGRAM_TOKEN     bot token from @BotFather
#   TELEGRAM_CHAT_ID   your chat id (from @userinfobot, or getUpdates)
name: telegram-alert

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: telegram-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore cooldown state
        uses: actions/cache@v4
        with:
          path: .alert-state.json
          key: tg-alert-state-${{ github.run_id }}
          restore-keys: |
            tg-alert-state-
      - name: Scan for CLEAN setups
        id: scan
        env:
          ALERT_COOLDOWN_HOURS: "4"
          ALERT_SCRIPT_B64: ""
        run: |
          echo "$ALERT_SCRIPT_B64" | base64 -d > alert-scan.js
          node alert-scan.js
      - name: Telegram on CLEAN setup
        if: steps.scan.outputs.has_setup == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUBJECT: ${{ steps.scan.outputs.subject }}
          BODY: ${{ steps.scan.outputs.body }}
        run: |
          printf '%s\n\n%s' "$SUBJECT" "$BODY" > msg.txt
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode "text@msg.txt" \
            -d disable_web_page_preview=true)
          echo "$RESP"
          echo "$RESP" | grep -q '"ok":true' || { echo "Telegram send failed (check TELEGRAM_TOKEN / TELEGRAM_CHAT_ID)"; exit 1; }
          echo "Telegram alert sent."
