name: email-alert

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: email-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Restore cooldown state
        uses: actions/cache@v4
        with:
          path: .alert-state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-
            
      - name: Scan for CLEAN setups
        id: scan
        env:
          ALERT_COOLDOWN_HOURS: "4"
        run: node alert-scan.js
        
      - name: Email on CLEAN setup
        if: steps.scan.outputs.has_setup == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: Delta Scanner <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.ALERT_TO }}
          subject: ${{ steps.scan.outputs.subject }}
          body: ${{ steps.scan.outputs.body }}
